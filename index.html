<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLESOUP | TV Dashboard</title>
    <!-- Syne is a great alternative for the 'Sakuya' display look -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Product+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #EF3E4A;
            --bg-bright: #f2616b;
            --text-color: #FEDAC2;
            --off-white: #FAF9F6;
            --accent-color: #B0D8DC;
            --font-display: 'Syne', sans-serif;
            --font-main: 'Product Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- TYPOGRAPHY UPDATES --- */
        .display-font { 
            font-family: var(--font-display); 
            color: var(--off-white) !important; 
            text-transform: uppercase;
        }

        /* --- LAYOUT --- */
        header { text-align: center; padding: 1vh; }
        #round-indicator { font-size: 4vh; letter-spacing: 8px; }
        #timer-display { font-size: 15vh; margin-top: -2vh; line-height: 1; }

        .main-workspace { flex: 1; display: flex; align-items: center; justify-content: center; }

        /* --- SIDEBARS --- */
        .sidebar {
            position: fixed; top: 50%; transform: translateY(-50%);
            height: 90vh; z-index: 100; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .sidebar.left { width: 400px; left: -350px; }
        .sidebar.left.open { left: 10px; }
        .sidebar.right { width: 280px; right: -230px; }
        .sidebar.right.open { right: 10px; }

        .tab-handle {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 50px; height: 100px; background: var(--bg-bright);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 30px; border-radius: 20px;
        }
        .left .tab-handle { right: 0; border-top-left-radius: 0; border-bottom-left-radius: 0; }
        .right .tab-handle { left: 0; border-top-right-radius: 0; border-bottom-right-radius: 0; }

        .pill-card { background: var(--bg-bright); border-radius: 24px; height: 100%; padding: 20px; overflow: hidden; }

        /* --- PARTICIPANTS (Fit 6 on screen) --- */
        #player-container { 
            display: flex; flex-direction: column; gap: 8px; 
            height: calc(100% - 180px); /* Adjust for header/leaderboard */
        }
        .player-slot {
            background: rgba(0,0,0,0.1); border-radius: 15px;
            padding: 8px 12px; display: flex; align-items: center; gap: 10px;
            position: relative;
        }
        .player-info { flex: 1; }
        .player-input {
            background: transparent; border: none; border-bottom: 1px solid var(--text-color);
            color: var(--off-white); font-size: 18px; width: 100%; font-weight: bold;
        }

        .gulp-circle {
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--accent-color); color: var(--bg-color);
            font-weight: 800; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); flex-shrink: 0;
        }

        .mole-emoji { cursor: pointer; font-size: 24px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2)); }
        .mole-emoji.used { opacity: 0.15; grayscale: 1; }

        /* --- LEADERBOARD --- */
        .leaderboard-entry {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.05); margin-bottom: 4px; padding: 5px 10px;
            border-radius: 10px; font-weight: bold; color: var(--off-white);
        }
        .score-ctrl { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 5px; margin: 0 2px; }

        /* --- BUTTONS --- */
        button { cursor: pointer; border: none; font-family: var(--font-main); transition: 0.2s; }
        button:active { transform: scale(0.9); }
        .nav-btn { background: var(--bg-bright); color: var(--off-white); padding: 15px 30px; border-radius: 50px; font-weight: bold; }

        #start-overlay {
            position: fixed; inset: 0; background: var(--bg-color);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .hidden { display: none !important; }

        .verification-overlay {
            position: absolute; inset: 0; background: var(--bg-bright); 
            display: flex; gap: 10px; align-items: center; justify-content: center; border-radius: 15px;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 class="display-font" style="font-size: 10vw;">BATTLESOUP</h1>
        <button onclick="ui.startGame()" class="nav-btn" style="font-size: 30px;">START GAME</button>
    </div>

    <header>
        <div id="round-indicator" class="display-font">ROUND 1</div>
        <div id="timer-display" class="display-font">00:00</div>
    </header>

    <main class="main-workspace">
        <button id="central-start-btn" onclick="game.startTimer()" 
                style="font-size: 3vh; padding: 3vh 8vh; border-radius: 100px; background: var(--bg-bright); color: var(--off-white); border: 2px solid var(--off-white);">
            START TIMER
        </button>
    </main>

    <!-- LEFT SIDEBAR -->
    <div class="sidebar left" id="left-sidebar">
        <div class="tab-handle" onclick="ui.toggleSidebar('left')">🏆</div>
        <div class="pill-card">
            <h2 class="display-font" style="font-size: 20px; margin-bottom: 10px;">Leaderboard</h2>
            <div id="leaderboard-list" style="height: 180px; overflow-y: auto; margin-bottom: 15px;"></div>
            
            <h2 class="display-font" style="font-size: 20px; margin-bottom: 10px;">Kitchen Staff</h2>
            <div id="player-container"></div>
        </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="sidebar right" id="right-sidebar">
        <div class="tab-handle" onclick="ui.toggleSidebar('right')">⚡</div>
        <div class="pill-card">
            <h2 class="display-font" style="font-size: 20px;">Powerups</h2>
            <div style="margin-top:20px; color: var(--off-white); font-size: 14px;">
                <p><strong>🛡️ DODGE</strong><br>Defender vs Attacker: LEFT or RIGHT. If different, dodge successful!</p>
                <hr style="margin:15px 0; opacity:0.2">
                <p><strong>🕵️ MOLE</strong><br>Check 1 Row/Col. 2 Uses.</p>
                <hr style="margin:15px 0; opacity:0.2">
                <p><strong>🔍 ESPIONAGE</strong><br>2 Guesses, No Attack.</p>
            </div>
        </div>
    </div>

    <footer style="padding: 20px; display: flex; justify-content: center; gap: 10px;">
        <button class="nav-btn" onclick="game.changeRound(-1)">BACK</button>
        <button class="nav-btn" onclick="game.changeRound(1)">NEXT</button>
        <button class="nav-btn" onclick="ui.goHome()">HOME</button>
        <button class="nav-btn" style="background: var(--off-white); color: var(--bg-color)" onclick="game.pauseTimer()">STOP</button>
        <button class="nav-btn" onclick="game.startTimer()">RESUME</button>
        <button class="nav-btn" onclick="game.resetTimer()">RESTART</button>
    </footer>

    <script>
        class GameEngine {
            constructor() {
                this.round = 1;
                this.seconds = 0;
                this.timerInterval = null;
                this.elements = ["Hydrogen", "Helium", "Lithium", "Beryllium", "Boron", "Carbon"];
                this.players = this.elements.map((name, i) => ({
                    id: i,
                    name: name,
                    baseScore: 0,
                    roundTime: null,
                    isVerified: false
                }));
            }

            startTimer() {
                if (this.timerInterval) return;
                document.getElementById('central-start-btn').classList.add('hidden');
                this.timerInterval = setInterval(() => {
                    this.seconds++;
                    ui.updateTimer(this.seconds);
                }, 1000);
            }

            pauseTimer() {
                clearInterval(this.timerInterval);
                this.timerInterval = null;
            }

            resetTimer() {
                this.pauseTimer();
                this.seconds = 0;
                ui.updateTimer(0);
                document.getElementById('central-start-btn').classList.remove('hidden');
            }

            changeRound(val) {
                // Commit round points to baseScore
                this.players.forEach(p => {
                    if (p.isVerified) p.baseScore += ui.getRoundPoints(p);
                    p.roundTime = null;
                    p.isVerified = false;
                });
                this.round = Math.max(1, this.round + val);
                this.resetTimer();
                ui.updateRound(this.round);
                ui.renderAll();
            }

            recordGulp(id) {
                const p = this.players[id];
                if (p.roundTime === null) {
                    p.roundTime = this.seconds;
                    ui.renderAll();
                }
            }

            verify(id, status) {
                const p = this.players[id];
                if (status) {
                    p.isVerified = true;
                } else {
                    p.roundTime = null;
                    p.isVerified = false;
                }
                ui.renderAll();
            }

            adjustScore(id, delta) {
                this.players[id].baseScore += delta;
                ui.renderAll();
            }
        }

        class UIController {
            toggleSidebar(id) {
                document.getElementById(`${id}-sidebar`).classList.toggle('open');
            }

            updateTimer(s) {
                const mins = Math.floor(s / 60).toString().padStart(2, '0');
                const secs = (s % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `${mins}:${secs}`;
            }

            updateRound(r) {
                document.getElementById('round-indicator').innerText = `ROUND ${r}`;
            }

            formatTime(s) {
                return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
            }

            getRoundPoints(player) {
                if (!player.isVerified) return 0;
                const verifiedOnes = game.players
                    .filter(p => p.isVerified)
                    .sort((a, b) => a.roundTime - b.roundTime);
                const rank = verifiedOnes.findIndex(p => p.id === player.id);
                if (rank === 0) return 3;
                if (rank === 1) return 2;
                return 1;
            }

            renderAll() {
                this.renderPlayers();
                this.renderLeaderboard();
            }

            renderPlayers() {
                const container = document.getElementById('player-container');
                container.innerHTML = game.players.map(p => `
                    <div class="player-slot">
                        <button class="gulp-circle" onclick="game.recordGulp(${p.id})">GULP!</button>
                        <div class="player-info">
                            <input class="player-input" value="${p.name}" onchange="game.players[${p.id}].name=this.value">
                            <div style="margin-top:5px; display:flex; gap:10px; align-items:center;">
                                <span class="mole-emoji" onclick="this.classList.toggle('used')">🦔</span>
                                <span class="mole-emoji" onclick="this.classList.toggle('used')">🦔</span>
                                <span style="color:var(--off-white); font-weight:bold; font-size:14px;">
                                    ${p.roundTime !== null ? this.formatTime(p.roundTime) : ''}
                                </span>
                            </div>
                        </div>
                        ${p.roundTime !== null && !p.isVerified ? `
                            <div class="verification-overlay">
                                <button onclick="game.verify(${p.id}, true)" style="background:#4CAF50; color:white; padding:10px; border-radius:10px;">YES</button>
                                <button onclick="game.verify(${p.id}, false)" style="background:#f44336; color:white; padding:10px; border-radius:10px;">NO</button>
                            </div>
                        ` : ''}
                        ${p.isVerified ? `<span style="color:#4CAF50; font-weight:bold;">✓</span>` : ''}
                    </div>
                `).join('');
            }

            renderLeaderboard() {
                const list = document.getElementById('leaderboard-list');
                const sorted = [...game.players].sort((a, b) => {
                    const totalA = a.baseScore + this.getRoundPoints(a);
                    const totalB = b.baseScore + this.getRoundPoints(b);
                    return totalB - totalA;
                });

                list.innerHTML = sorted.map(p => {
                    const roundPts = this.getRoundPoints(p);
                    const displayScore = p.baseScore + roundPts;
                    return `
                        <div class="leaderboard-entry">
                            <span style="flex:1">${p.name}</span>
                            <span style="margin-right:10px; color:var(--accent-color)">${displayScore} PT</span>
                            <button class="score-ctrl" onclick="game.adjustScore(${p.id}, 1)">+</button>
                            <button class="score-ctrl" onclick="game.adjustScore(${p.id}, -1)">-</button>
                        </div>
                    `;
                }).join('');
            }

            startGame() {
                document.getElementById('start-overlay').classList.add('hidden');
                this.renderAll();
            }

            goHome() { if(confirm("Reset Game?")) location.reload(); }
        }

        const game = new GameEngine();
        const ui = new UIController();
    </script>
</body>
</html>
