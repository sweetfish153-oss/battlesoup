<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLESOUP Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Product+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #EF3E4A;
            --bg-bright: #f2616b;
            --text-color: #FEDAC2;
            --off-white: #FAF9F6; /* NEW TEXT COLOR */
            --accent-color: #B0D8DC;
            --font-main: 'Product Sans', 'Google Sans', sans-serif;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            aspect-ratio: 16 / 9;
        }

        /* --- UI COMPONENTS --- */
        .pill-card {
            background-color: var(--bg-bright);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button {
            cursor: pointer;
            border: none;
            font-family: var(--font-main);
            border-radius: 50px;
            background: var(--bg-bright);
            color: var(--text-color);
            transition: var(--transition);
            font-weight: bold;
            padding: 10px 20px;
        }

        button:active { transform: scale(0.95); }

        /* --- SIDEBARS (Updated Width) --- */
        .sidebar {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            height: 80%;
            z-index: 100;
            transition: var(--transition);
        }

        .sidebar.left { width: 320px; left: -270px; }
        .sidebar.left.open { left: 10px; }
        
        .sidebar.right { width: 250px; right: -200px; } /* Leaner width */
        .sidebar.right.open { right: 10px; }

        .tab-handle {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 80px;
            background: var(--bg-bright);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
        }

        .left .tab-handle { right: 0; border-radius: 0 20px 20px 0; }
        .right .tab-handle { left: 0; border-radius: 20px 0 0 20px; }

        .sidebar-content {
            height: 100%;
            width: calc(100% - 50px);
            overflow-y: auto;
            margin: 0 50px;
            color: var(--off-white); /* Updated Text Color */
        }

        /* --- LAYOUT POSITIONS --- */
        header {
            text-align: center;
            padding: 20px;
        }

        #timer-display {
            font-size: 100px;
            font-weight: bold;
            color: var(--off-white);
            margin-top: -10px;
        }

        .round-title { 
            font-size: 30px; 
            color: var(--off-white); 
            letter-spacing: 5px;
        }

        .main-workspace {
            flex: 1; /* This is the empty center part for scribbling */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- PLAYER LIST & LEADERBOARD --- */
        .player-slot { margin-bottom: 15px; padding: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .player-input {
            background: transparent; border: none; border-bottom: 1px solid var(--text-color);
            color: var(--off-white); font-size: 16px; width: 100px;
        }
        .gulp-btn { background: var(--accent-color); color: var(--bg-color); margin-left: 5px;}
        
        .mole-emoji { cursor: pointer; font-size: 22px; transition: 0.3s; }
        .mole-emoji.used { opacity: 0.1; filter: grayscale(1); }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            margin-bottom: 5px;
            padding: 5px;
            border-bottom: 1px solid rgba(250, 249, 246, 0.2);
        }

        /* --- BOTTOM NAV --- */
        footer {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .nav-btn { background: var(--bg-bright); padding: 12px 25px; color: var(--off-white); }

        #start-overlay {
            position: fixed; inset: 0; background: var(--bg-color);
            z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Start Screen Overlay -->
    <div id="start-overlay">
        <h1 style="font-size: 80px; color: var(--accent-color); margin-bottom: 20px;">BATTLESOUP</h1>
        <button onclick="ui.startGame()" style="font-size: 28px; padding: 20px 50px;">START</button>
    </div>

    <!-- Header: Round and Timer pushed to top -->
    <header>
        <div id="round-indicator" class="round-title">ROUND 1</div>
        <div id="timer-display">00:00</div>
    </header>

    <!-- Center Workspace (Empty for scribbling) -->
    <main class="main-workspace">
        <button id="central-start-btn" onclick="game.startTimer()" 
                style="font-size: 24px; padding: 20px 60px; border: 4px solid var(--off-white);">
            START TIMER
        </button>
    </main>

    <!-- Left Sidebar: Players & Dynamic Leaderboard -->
    <div class="sidebar left" id="left-sidebar">
        <div class="tab-handle" onclick="ui.toggleSidebar('left')">🏆</div>
        <div class="sidebar-content pill-card">
            <h2 style="color: var(--accent-color); margin-bottom: 10px;">LEADERBOARD</h2>
            <div id="leaderboard-list">
                <!-- Sorted by Current Round Verification -->
            </div>
            <hr style="margin: 15px 0; opacity: 0.3;">
            <h3 style="margin-bottom: 10px;">PARTICIPANTS</h3>
            <div id="player-container"></div>
            <button onclick="game.addPlayer()" style="width: 100%; margin-top: 10px; background: rgba(0,0,0,0.2);">+ ADD PLAYER</button>
        </div>
    </div>

    <!-- Right Sidebar: Leaner Powerups -->
    <div class="sidebar right" id="right-sidebar">
        <div class="tab-handle" onclick="ui.toggleSidebar('right')">⚡</div>
        <div class="sidebar-content pill-card">
            <h2 style="color: var(--accent-color); font-size: 1.2em;">POWERUPS</h2>
            <div style="margin-top:20px;">
                <p><strong>🛡️ DODGE</strong><br><small>Choose LEFT or RIGHT on Treaty. If different from attacker, you dodge.</small></p>
                <br>
                <p><strong>🕵️ MOLE</strong><br><small>Ask about specific row/column (2 uses).</small></p>
                <br>
                <p><strong>🔍 ESPIONAGE</strong><br><small>2 guesses instead of attacking.</small></p>
            </div>
        </div>
    </div>

    <!-- Bottom Controls -->
    <footer>
        <button class="nav-btn" onclick="game.changeRound(-1)">◀ BACK</button>
        <button class="nav-btn" onclick="game.changeRound(1)">NEXT ▶</button>
        <button class="nav-btn" onclick="ui.goHome()">HOME</button>
        <button class="nav-btn" style="background: var(--accent-color); color: var(--bg-color)" onclick="game.pauseTimer()">STOP</button>
        <button class="nav-btn" onclick="game.startTimer()">RESUME</button>
        <button class="nav-btn" onclick="game.resetTimer()">RESTART</button>
    </footer>

    <script>
        class GameEngine {
            constructor() {
                this.round = 1;
                this.seconds = 0;
                this.timerInterval = null;
                this.players = [];
            }

            addPlayer() {
                if (this.players.length >= 6) return;
                this.players.push({
                    id: Date.now(),
                    name: `Slot ${this.players.length + 1}`,
                    totalScore: 0,
                    currentTime: null,
                    isVerified: false
                });
                ui.renderPlayers();
            }

            startTimer() {
                if (this.timerInterval) return;
                document.getElementById('central-start-btn').classList.add('hidden');
                this.timerInterval = setInterval(() => {
                    this.seconds++;
                    ui.updateTimer(this.seconds);
                }, 1000);
            }

            pauseTimer() {
                clearInterval(this.timerInterval);
                this.timerInterval = null;
            }

            resetTimer() {
                this.pauseTimer();
                this.seconds = 0;
                ui.updateTimer(0);
                document.getElementById('central-start-btn').classList.remove('hidden');
            }

            changeRound(val) {
                // Finalize points from current round before switching
                this.players.forEach(p => {
                    if (p.isVerified) {
                        const rank = this.getRankInRound(p);
                        if (rank === 0) p.totalScore += 3;
                        else if (rank === 1) p.totalScore += 2;
                        else p.totalScore += 1;
                    }
                    // Reset round state
                    p.currentTime = null;
                    p.isVerified = false;
                });

                this.round = Math.max(1, this.round + val);
                ui.updateRound(this.round);
                this.resetTimer();
                ui.renderPlayers();
                ui.renderLeaderboard();
            }

            recordGulp(id) {
                const p = this.players.find(x => x.id === id);
                if (p && p.currentTime === null) {
                    p.currentTime = this.seconds;
                    ui.renderPlayers();
                }
            }

            verify(id, correct) {
                const p = this.players.find(x => x.id === id);
                if (correct) {
                    p.isVerified = true;
                } else {
                    p.currentTime = null;
                    p.isVerified = false;
                }
                ui.renderPlayers();
                ui.renderLeaderboard();
            }

            getRankInRound(player) {
                return this.players
                    .filter(p => p.isVerified)
                    .sort((a, b) => a.currentTime - b.currentTime)
                    .indexOf(player);
            }
        }

        class UIController {
            toggleSidebar(id) {
                document.getElementById(`${id}-sidebar`).classList.toggle('open');
            }

            updateTimer(s) {
                const mins = Math.floor(s / 60).toString().padStart(2, '0');
                const secs = (s % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `${mins}:${secs}`;
            }

            updateRound(r) {
                document.getElementById('round-indicator').innerText = `ROUND ${r}`;
            }

            startGame() {
                document.getElementById('start-overlay').classList.add('hidden');
                game.addPlayer();
            }

            goHome() { if(confirm("Reset everything?")) location.reload(); }

            renderPlayers() {
                const container = document.getElementById('player-container');
                container.innerHTML = game.players.map(p => `
                    <div class="player-slot pill-card">
                        <input class="player-input" value="${p.name}" onchange="game.players.find(x=>x.id==${p.id}).name=this.value">
                        <button class="gulp-btn" onclick="game.recordGulp(${p.id})">GULP!</button>
                        <div style="margin-top:8px">
                            <span class="mole-emoji" onclick="this.classList.toggle('used')">🦔</span>
                            <span class="mole-emoji" onclick="this.classList.toggle('used')">🦔</span>
                            <span style="float:right; font-weight:bold">${p.currentTime !== null ? ui.formatTime(p.currentTime) : ''}</span>
                        </div>
                        ${p.currentTime !== null && !p.isVerified ? `
                            <div style="margin-top:10px">
                                <button onclick="game.verify(${p.id}, true)" style="background:#4CAF50; font-size:12px">CORRECT</button>
                                <button onclick="game.verify(${p.id}, false)" style="background:#EF3E4A; font-size:12px">WRONG</button>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            }

            renderLeaderboard() {
                const list = document.getElementById('leaderboard-list');
                // Calculate temporary "live" scores for the current round
                const sorted = [...game.players].sort((a, b) => {
                    const scoreA = a.totalScore + (a.isVerified ? this.getLivePoints(a) : 0);
                    const scoreB = b.totalScore + (b.isVerified ? this.getLivePoints(b) : 0);
                    return scoreB - scoreA;
                });

                list.innerHTML = sorted
                    .filter(p => p.totalScore > 0 || p.isVerified)
                    .map(p => `
                        <div class="leaderboard-entry">
                            <span>${p.name}</span>
                            <span>${p.totalScore + (p.isVerified ? this.getLivePoints(p) : 0)} PT</span>
                        </div>
                    `).join('');
            }

            getLivePoints(player) {
                const rank = game.getRankInRound(player);
                if (rank === 0) return 3;
                if (rank === 1) return 2;
                if (rank > 1) return 1;
                return 0;
            }

            formatTime(s) {
                return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
            }
        }

        const game = new GameEngine();
        const ui = new UIController();
    </script>
</body>
</html>
